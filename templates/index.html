<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReClip — Free Media Downloader</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --fg: #3a3a38;
      --accent: #e85d2a;
      --accent-hover: #d04e1f;
      --muted: #9c9889;
      --card: #fff;
      --card-border: #e2ded6;
      --success: #2d8a4e;
      --error: #c43d3d;
      --radius: 14px;
      --shimmer: linear-gradient(90deg, #ebe8e2 25%, #f0ede7 50%, #ebe8e2 75%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .page {
      max-width: 1380px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .brand { margin-bottom: 48px; }
    .brand h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 4.2rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
    }
    .brand h1 em { font-style: italic; color: var(--accent); }
    .brand p {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      resize: none;
      min-height: 56px;
      transition: border-color 0.25s, box-shadow 0.25s;
      margin-bottom: 6px;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 93, 42, 0.08);
    }
    textarea::placeholder { color: var(--muted); }

    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
    }
    .pill-group {
      display: flex;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .pill {
      padding: 9px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .pill.active { background: var(--fg); color: var(--bg); }
    .pill:not(.active):hover { color: var(--fg); }

    .fetch-btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .fetch-btn:hover { background: var(--accent-hover); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Cards */
    .cards { margin-top: 24px; }

    .card {
      display: flex;
      gap: 14px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      width: 150px;
      min-width: 150px;
      height: 95px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-border);
      flex-shrink: 0;
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* No-thumbnail icon */
    .card-thumb .no-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .card-thumb .no-thumb svg {
      width: 28px;
      height: 28px;
      opacity: 0.5;
    }

    /* Shimmer skeleton for loading state */
    .card-thumb.loading {
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 6px;
    }
    .skeleton-line.short { width: 40%; height: 10px; }
    .skeleton-line.medium { width: 75%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1rem;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .source-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      min-width: 0;
    }
    .source-link {
      font-size: 0.66rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dashed rgba(58, 58, 56, 0.25);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .source-link:hover {
      color: var(--fg);
      border-bottom-color: rgba(58, 58, 56, 0.5);
    }
    .copy-btn {
      padding: 4px 8px;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      cursor: pointer;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: var(--fg); border-color: var(--muted); }
    .copy-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-dl-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .card-dl-btn:hover { background: #2d2d2a; }
    .card-dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .card-dl-btn.done { background: var(--success); color: #fff; }
    .card-dl-btn.error { background: var(--error); color: #fff; }

    .card-status {
      font-size: 0.68rem;
      color: var(--muted);
    }
    .card-status.downloading { color: var(--accent); }
    .card-status.done { color: var(--success); }
    .card-status.error { color: var(--error); }
    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
      pointer-events: none;
    }
    .toast {
      min-width: 280px;
      max-width: 420px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(45, 138, 78, 0.22);
      background: rgba(255, 252, 247, 0.96);
      box-shadow: 0 14px 34px rgba(58, 58, 56, 0.12);
      color: var(--fg);
      transform: translateY(14px);
      opacity: 0;
      animation: toastIn 0.25s ease forwards;
      pointer-events: auto;
    }
    .toast.hide {
      animation: toastOut 0.25s ease forwards;
    }
    .toast-title {
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--success);
      margin-bottom: 5px;
    }
    .toast-body {
      font-size: 0.74rem;
      line-height: 1.45;
      word-break: break-word;
    }
    @keyframes toastIn {
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes toastOut {
      to { transform: translateY(10px); opacity: 0; }
    }

    .progress-wrap {
      width: 100%;
      margin-top: 4px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: #ece8e1;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.35s ease;
    }
    .progress-text {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .media-preview {
      width: 100%;
      border-radius: 8px;
      background: #000;
    }

    .audio-preview {
      width: 100%;
    }

    .preview-panel {
      width: 300px;
      min-width: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--card-border);
      padding-left: 12px;
      margin-left: 2px;
    }

    .preview-panel .media-preview {
      max-height: 175px;
      object-fit: contain;
    }

    .preview-panel .audio-preview {
      width: 100%;
    }

    .q-chip {
      padding: 4px 10px;
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-chip.active {
      border-color: var(--fg);
      color: var(--fg);
      background: rgba(26,26,24,0.04);
    }
    .q-chip:hover:not(.active) { border-color: var(--muted); }

    /* Error card */
    .card.card-error {
      border-color: rgba(196, 61, 61, 0.2);
      background: rgba(196, 61, 61, 0.03);
    }
    .card-error-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(196, 61, 61, 0.08);
      color: var(--error);
    }
    .card-error-icon svg {
      width: 24px;
      height: 24px;
    }
    .card-error-msg {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: 2px;
      line-height: 1.4;
    }
    .card-error-url {
      font-size: 0.65rem;
      color: var(--muted);
      word-break: break-all;
      margin-top: 4px;
    }

    /* Download all bar */
    .dl-all-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .dl-all-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .dl-all-btn:hover { background: #2d2d2a; }
    .dl-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.8;
    }

    /* Mobile */
    @media (max-width: 860px) {
      .brand h1 { font-size: 3rem; }
      .page { padding: 40px 16px 60px; }
      .card { flex-direction: column; gap: 10px; }
      .card-thumb {
        width: 100%;
        min-width: unset;
        height: 160px;
      }
      .card-title { white-space: normal; }
      .controls { flex-wrap: wrap; }
      .fetch-btn { width: 100%; }
      .preview-panel {
        width: 100%;
        min-width: unset;
        border-left: none;
        border-top: 1px solid var(--card-border);
        padding-left: 0;
        padding-top: 10px;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <h1>Re<em>Clip</em></h1>
      <p>Free media downloader</p>
    </div>

    <textarea id="urls" placeholder="Paste video URLs, magnet links, or .torrent URLs..." rows="2"></textarea>
    <p class="hint">Multiple links? Separate with spaces, commas, or newlines.</p>

    <div class="controls">
      <div class="pill-group">
        <button class="pill active" data-format="video" onclick="setFormat(this)">MP4</button>
        <button class="pill" data-format="audio" onclick="setFormat(this)">MP3</button>
      </div>
      <button class="fetch-btn" id="goBtn" onclick="go()">Fetch</button>
    </div>

    <div id="cards" class="cards"></div>

    <div class="footer">
      YouTube &middot; TikTok &middot; Instagram &middot; Twitter/X &middot; Reddit &middot; Facebook<br>
      Vimeo &middot; Twitch &middot; Dailymotion &middot; SoundCloud &middot; Loom &middot; Streamable<br>
      Pinterest &middot; Tumblr &middot; Threads &middot; LinkedIn &middot; 1000+ more
    </div>
  </div>
  <div id="toastStack" class="toast-stack"></div>

  <script>
    let currentFormat = 'video';
    let cardData = [];

    function setFormat(btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.format;
    }

    function parseUrls(text) {
      const matches = text.match(/magnet:[^\s]+|https?:\/\/[^\s]+/gi) || [];
      const clean = matches
        .map(u => u.trim().replace(/[),.;]+$/, ''))
        .filter(Boolean);
      return [...new Set(clean)];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function shortUrl(u) {
      if (!u) return '';
      return u.length > 72 ? u.slice(0, 72) + '...' : u;
    }

    function isVideoFile(name) {
      return /\.(mp4|webm|mov|m4v|mkv)$/i.test(name || '');
    }

    function isAudioFile(name) {
      return /\.(mp3|m4a|aac|ogg|wav|flac|opus)$/i.test(name || '');
    }

    async function copyUrl(idx) {
      const url = cardData[idx]?.url || '';
      if (!url) return;
      try {
        await navigator.clipboard.writeText(url);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
    }

    async function openInExplorer(idx) {
      const jobId = cardData[idx]?.jobId;
      if (!jobId) return;

      try {
        const res = await fetch(`/api/open/${jobId}`, { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          throw new Error(data.error);
        }
      } catch (err) {
        alert(friendlyError(err.message || 'Could not open Windows Explorer'));
      }
    }

    function showToast(title, body) {
      const stack = document.getElementById('toastStack');
      if (!stack) return;

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="toast-title">${esc(title)}</div>
        <div class="toast-body">${esc(body)}</div>
      `;
      stack.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 260);
      }, 4200);
    }

    function friendlyError(err) {
      if (err.includes('aria2c')) return 'Torrent support needs aria2c installed on server';
      if (err.includes('Torrent')) return err;
      if (err.includes('Unsupported URL')) return 'This URL is not supported';
      if (err.includes('Video unavailable')) return 'Video is unavailable or private';
      if (err.includes('Private video')) return 'This video is private';
      if (err.includes('HTTP Error 403')) return 'Access denied by the platform';
      if (err.includes('HTTP Error 404')) return 'Video not found';
      if (err.includes('copyright')) return 'Video blocked due to copyright';
      if (err.includes('geo')) return 'Video not available in your region';
      if (err.includes('timed out') || err.includes('Timed out')) return 'Request timed out — try again';
      if (err.includes('network') || err.includes('Network')) return 'Network error — check your connection';
      return err.length > 80 ? err.slice(0, 80) + '...' : err;
    }

    document.getElementById('urls').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });

    async function go() {
      const urls = parseUrls(document.getElementById('urls').value);
      if (!urls.length) {
        const container = document.getElementById('cards');
        container.innerHTML = `
          <div class="card card-error">
            <div class="card-thumb">
              <div class="card-error-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              </div>
            </div>
            <div class="card-body">
              <div class="card-title" style="color:var(--error)">No valid links found</div>
              <div class="card-error-msg">Paste http(s) URLs, magnet links, or .torrent URLs.</div>
            </div>
          </div>
        `;
        return;
      }

      const btn = document.getElementById('goBtn');
      const container = document.getElementById('cards');
      btn.disabled = true;
      btn.textContent = 'Fetching...';
      document.getElementById('urls').value = '';
      const inProgress = new Set(['loading', 'ready', 'downloading']);
      const pending = [];

      for (const url of urls) {
        const existingIdx = cardData.findIndex(c => c.url === url && inProgress.has(c.status));
        if (existingIdx !== -1) {
          continue;
        }
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);
        pending.push({ url, idx });
      }

      if (!pending.length) {
        btn.disabled = false;
        btn.textContent = 'Fetch';
        return;
      }

      const tasks = pending.map(async ({ url, idx }) => {
        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
            renderCard(idx);
            return;
          }

          cardData[idx] = {
            ...cardData[idx],
            status: 'ready',
            title: data.title || '',
            thumbnail: data.thumbnail || '',
            duration: data.duration,
            uploader: data.uploader || '',
            is_torrent: !!data.is_torrent,
            formats: data.formats || [],
            selectedFormatId: data.formats?.[0]?.id || null,
          };
          renderCard(idx);
          await dlCard(idx);
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
          renderCard(idx);
        }
      });

      await Promise.allSettled(tasks);

      btn.disabled = false;
      btn.textContent = 'Fetch';
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      // Loading skeleton
      if (c.status === 'loading') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
          </div>
        `;
        return;
      }

      // Error state
      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" style="color:var(--error)">Could not fetch video</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      // Ready / downloading / done / error states
      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      }

      let qualityChips = '';
      if (!isAudio && !c.is_torrent && c.formats && c.formats.length > 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      let mediaHtml = '';
      const sourceHtml = `
        <div class="source-row">
          <a class="source-link" href="${esc(c.url || '')}" target="_blank" rel="noopener noreferrer" title="${esc(c.url || '')}">${esc(shortUrl(c.url || ''))}</a>
          <button class="copy-btn" onclick="copyUrl(${idx})">Copy</button>
        </div>
      `;
      if (c.status === 'ready') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Download</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        const p = Number.isFinite(c.progress) ? Math.max(0, Math.min(100, Math.floor(c.progress))) : 0;
        const parts = [`${p}%`];
        if (c.speed) parts.push(c.speed);
        if (c.eta) parts.push(`ETA ${c.eta}`);
        const transferText = parts.join(' · ');
        actionHtml = `
          <span class="card-status downloading"><span class="spin"></span> ${esc(c.message || 'Downloading...')}${c.stalled ? ' (waiting...)' : ''}</span>
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
            <div class="progress-text">${esc(transferText)}</div>
          </div>
        `;
      } else if (c.status === 'done') {
        if (isVideoFile(c.filename) && c.jobId) {
          mediaHtml = `<video class="media-preview" controls preload="metadata" src="/api/preview/${c.jobId}"></video>`;
        } else if (isAudioFile(c.filename) && c.jobId) {
          mediaHtml = `<audio class="audio-preview" controls preload="metadata" src="/api/preview/${c.jobId}"></audio>`;
        }
        actionHtml = `
          <span class="card-status done">Saved: ${esc(c.filename || '')}${c.download_dir ? ' · ' + esc(c.download_dir) : ''}</span>
          <button class="copy-btn" onclick="openInExplorer(${idx})">Show In Explorer</button>
        `;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Retry</button>
          <span class="card-status error">${esc(friendlyError(c.error || 'Download failed'))}</span>`;
      }

      el.className = mediaHtml ? 'card card-with-preview' : 'card';
      const mediaPanelHtml = mediaHtml ? `<div class="preview-panel">${mediaHtml}</div>` : '';

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(c.title || 'Untitled')}</div>
          <div class="card-meta">${esc(c.uploader)}${c.duration ? ' · ' + fmtDur(c.duration) : ''}${c.is_torrent ? ' · TORRENT' : ''}</div>
          ${sourceHtml}
          <div class="card-actions">${actionHtml}</div>
        </div>
        ${mediaPanelHtml}
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">Download All</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      c.progress = 0;
      c.speed = '';
      c.eta = '';
      c.message = 'Starting...';
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
          }),
        });
        const data = await res.json();
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${c.jobId}`);
          const data = await res.json();
          if (data.status === 'done') {
            clearInterval(iv);
            const justFinished = c.status !== 'done';
            c.status = 'done';
            c.filename = data.filename;
            c.progress = data.progress ?? 100;
            c.message = data.message || 'Completed';
            c.download_dir = data.download_dir || '';
            renderCard(idx);
            if (justFinished) {
              showToast('Archivo listo', c.filename || c.title || 'Descarga completada');
            }
          } else if (data.status === 'downloading') {
            c.status = 'downloading';
            c.progress = data.progress ?? c.progress ?? 0;
            c.speed = data.speed || '';
            c.eta = data.eta || '';
            c.message = data.message || c.message || 'Downloading...';
            c.stalled = !!data.stalled;
            renderCard(idx);
          } else if (data.status === 'error') {
            clearInterval(iv);
            c.status = 'error';
            c.error = data.error;
            renderCard(idx);
          }
        } catch {
          clearInterval(iv);
          c.status = 'error';
          c.error = 'Lost connection to server';
          renderCard(idx);
        }
      }, 1000);
    }

    function saveCard(idx) {
      const c = cardData[idx];
      if (!c.jobId) return;
      const a = document.createElement('a');
      a.href = `/api/file/${c.jobId}`;
      a.download = c.filename || '';
      a.click();
    }

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Downloading...'; }

      for (let i = 0; i < cardData.length; i++) {
        if (cardData[i].status === 'ready') {
          await dlCard(i);
        }
      }

      if (btn) { btn.disabled = false; btn.textContent = 'Download All'; }
    }
  </script>
</body>
</html>
